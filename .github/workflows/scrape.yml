# What this workflow does — Phase E cron orchestrator.
#
# On every Tuesday + Thursday at 16:00 UTC (= 9am PDT in summer, 8am PST in
# winter — the 1-hour winter drift is accepted), runs the full V1 pipeline
# end-to-end:
#   1. Restore _local/ cache (scraped_seen.json + last_sent_digest.json)
#   2. python scripts/run_scrapers.py     → scrapes 32 named cos + 3 LinkedIn searches
#   3. python scripts/score_jobs.py       → scores via Claude API + writes Sheet
#   4. python scripts/send_digest.py      → emails roles ≥6/10 to recipient
#   5. Save updated _local/ cache
#   6. Upload digest.md + scored_results.json as artifacts (for post-mortem)
#
# Can also be triggered manually from the Actions tab (workflow_dispatch). Useful
# for one-off testing without waiting for the cron — e.g., after adding new
# companies to COMPANY_LIST.md or changing SCORING_PROMPT.md.
#
# Failures email the repo owner (GitHub default — no extra config needed).
# The pipeline scripts are designed to fail loud on real errors (bad JSON,
# Resend HTTP error, etc.); transient ATS failures are logged but don't crash.
#
# All 9 required secrets must be set under Settings → Secrets and variables →
# Actions before this workflow can run end-to-end. See docs/PHASE_E_SETUP.md.
# (The 2 markdown-content secrets — PROJECT_BRIEF_MD + COMPANY_LIST_MD — must be
# re-uploaded whenever the local files change; they're gitignored per CLAUDE.md
# Rule 7 so they can't be checked in.)

name: Job scraper — Tue/Thu morning

on:
  schedule:
    # 16:00 UTC Tue (2) + Thu (4) = 9am PDT in summer, 8am PST in winter
    - cron: "0 16 * * 2,4"
  workflow_dispatch: {}

# If a previous cron run is still in flight when the next one fires (or when
# someone clicks "Run workflow"), let the in-flight one finish and queue this
# one — don't cancel mid-run. The pipeline writes to a shared Google Sheet, so
# concurrent runs would race.
concurrency:
  group: scrape-pipeline
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # Steady-state runs finish in ~15 min (Apify 5-8 min + score 8-12 net-new roles).
                         # Bumped from 30 → 90 on 2026-05-14 after the cold-start run hit the 30-min ceiling
                         # at exactly 30m15s: with no scraped_seen.json cache yet, the deduper saw 78 roles
                         # as new and score_jobs.py was killed mid-loop. 90 min gives ample headroom for
                         # the cold start (~10 min scrape + ~25 min score 78 roles + buffer) and for future
                         # transient slowness (Apify hiccups, Anthropic rate-limit retries). GitHub Actions
                         # only bills actual minutes used, so a generous ceiling costs nothing.

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the Phase B dedup cache (so Tuesday's run doesn't re-surface
      # roles surfaced last Thursday) AND the Phase D re-send guard marker
      # (so we don't double-email if a manual trigger fires right after a
      # successful cron run). Cache key is unique per run so saves never
      # collide; restore-keys catches the most recent prior save by prefix.
      - name: Restore _local/ runtime state
        uses: actions/cache@v4
        with:
          path: |
            _local/scraped_seen.json
            _local/last_sent_digest.json
          key: scrape-state-${{ github.run_id }}
          restore-keys: |
            scrape-state-

      # Phase C requires the Google Sheets service account JSON as a file at
      # the path GOOGLE_SHEETS_KEY_PATH points to. We write it from the
      # GOOGLE_SHEETS_KEY_JSON secret at runtime (the secret stores the file's
      # contents directly, since GitHub secrets are strings only). Note: this
      # creates the file inside the runner — never committed, scoped to this run.
      - name: Write Google Sheets service-account key
        run: |
          mkdir -p _local
          printf '%s' "$GOOGLE_SHEETS_KEY_JSON" > _local/google_sheets_key.json
        env:
          GOOGLE_SHEETS_KEY_JSON: ${{ secrets.GOOGLE_SHEETS_KEY_JSON }}

      # Write the two local-only context files that score_jobs.py loads into the
      # system prompt — PROJECT_BRIEF.md (the strategic working copy) and
      # COMPANY_LIST.md (named target companies). Both are gitignored per
      # CLAUDE.md Rule 7 so they don't exist on the runner's fresh checkout.
      # When either file changes locally, the matching secret must be re-uploaded
      # to GitHub or the cron will keep using the stale version.
      # printf '%s' is shell-safe: '%s' is the format string (literal), and the
      # value is passed via the env: block (no shell interpolation of $ or `).
      - name: Write private context files from secrets
        run: |
          printf '%s' "$PROJECT_BRIEF_MD" > PROJECT_BRIEF.md
          printf '%s' "$COMPANY_LIST_MD" > COMPANY_LIST.md
        env:
          PROJECT_BRIEF_MD: ${{ secrets.PROJECT_BRIEF_MD }}
          COMPANY_LIST_MD: ${{ secrets.COMPANY_LIST_MD }}

      # All scripts use python-dotenv's load_dotenv() but also fall back to
      # os.environ when .env isn't present. We pass secrets via env: blocks
      # rather than writing a .env file — same behavior, no temp file to clean.
      - name: Run scrapers (Phase B)
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python scripts/run_scrapers.py

      - name: Score jobs (Phase A + Phase C Sheet write)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_KEY_PATH: _local/google_sheets_key.json
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python scripts/score_jobs.py

      - name: Send email digest (Phase D)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_RECIPIENT_EMAIL: ${{ secrets.DIGEST_RECIPIENT_EMAIL }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python scripts/send_digest.py

      # Upload the run's digest + scored results so the user can download them
      # from the Actions UI for post-mortem (e.g., why did Tuesday's run produce
      # 0 strong matches? Or why did the matcher score X a 4 instead of an 8?).
      # Retention=14d keeps storage modest; older runs auto-delete.
      - name: Upload run artifacts
        if: always()  # Upload even if a previous step failed — debugging needs them
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_id }}
          path: |
            _local/digest.md
            _local/scored_results.json
          retention-days: 14
          if-no-files-found: warn  # Don't fail the workflow if the pipeline didn't get far enough to produce these
